<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v7 - Ultra Fast Response</title>
    <style>
        /* [1] 레이아웃 및 배경 설정 */
        body { 
            background: #cbd3da; /* 회색 배경 */
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        /* [2] 상단 음명 및 Hz 표시부 */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7rem;
            font-weight: 900;
            color: #7f8c8d;
            line-height: 1;
            transition: color 0.1s, text-shadow 0.1s;
        }
        /* 정튜닝 시 화려한 네온 효과 */
        .note-alpha.tuned {
            color: #fff;
            text-shadow: 0 0 20px #2ecc71, 0 0 40px #2ecc71, 0 0 60px #2ecc71;
        }
        .freq-display { font-size: 1.5rem; color: #636e72; font-family: monospace; margin-top: 10px; }

        /* [3] 직사각형 유리관 디자인 */
        .glass-rect-container {
            position: relative;
            width: 92%;
            max-width: 550px;
            height: 160px; /* 세로 폭 확대 */
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            box-shadow: 
                inset 0 10px 20px rgba(255, 255, 255, 0.5),
                inset 0 -5px 15px rgba(0, 0, 0, 0.05),
                0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* 유리관 상단 반사광 */
        .glass-rect-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        /* 눈금 레이어 */
        .ticks-container {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            opacity: 0.25;
        }
        .tick { width: 1px; height: 12px; background: #000; position: relative; }
        .tick.major { height: 40px; width: 2px; }
        .tick-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* [4] 중력 엔진 바늘 (연속 수음 대응) */
        .needle {
            position: absolute;
            width: 4px;
            height: 100%;
            background: #e74c3c;
            left: 5%; /* 기본 위치 */
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            /* 부드러운 색상 전환만 transition 적용, 위치는 JS가 제어 */
            transition: background 0.2s, box-shadow 0.2s; 
        }
        .needle.tuned { background: #2ecc71; box-shadow: 0 0 20px #2ecc71; }

        .center-guide {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(46, 204, 113, 0.4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* [5] 하단 버튼 및 워터마크 */
        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .tuner-btn {
            padding: 22px 80px;
            font-size: 1.4rem;
            font-weight: bold;
            background: #2d3436;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .tuner-btn.running { background: #d63031; }

        .lab-watermark {
            color: #ff9f43; /* 주황색 워터마크 */
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 1rem;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0.00 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        /* [변수 설명]
           currentPos: 바늘의 현재 가로 위치 (%)
           velocity: 바늘의 이동 속도
           targetPos: 주파수 분석으로 도달해야 할 목표 위치
        */
        let audioContext, analyser, animationId;
        let isRunning = false;
        let lastBeepTime = 0;

        let currentPos = 5;      
        let velocity = 0;        
        const gravity = 0.9;     // 소리 없을 때 왼쪽으로 떨어지는 힘
        const friction = 0.88;   // 움직임의 떨림을 잡아주는 마찰력
        const followSpeed = 0.85; // [초고속 수음] 소리가 들릴 때 바늘이 목표를 쫓아가는 속도 (0~1)

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        /* 눈금 생성 로직 (-50 ~ +50) */
        function initTicks() {
            for (let i = -50; i <= 50; i += 5) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) {
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        /* 시작/중지 제어 */
        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopTuner();
                return;
            }
            startTuner();
        });

        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx();
            analyser = audioContext.createAnalyser();
            // 연속성을 위해 fftSize를 2048로 설정 (반응속도 최적화)
            analyser.fftSize = 2048; 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop(); // 초고속 루프 시작
            } catch (err) {
                alert("마이크를 사용할 수 없습니다. 권한을 확인해주세요.");
            }
        }

        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--";
            noteEl.classList.remove('tuned');
            freqEl.innerText = "0.00 Hz";
            // 중단 시 바늘 위치 초기화는 중력 로직에 맡기거나 즉시 수정 가능
        }

        /* [초고속 수음 메인 루프] - 약 0.016초마다 실행 */
        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            // 1. 소리 분석 (고민감도 알고리즘)
            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                // [소리가 감지된 경우]
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = pitch.toFixed(2) + " Hz";

                // 목표 위치 계산 (5% ~ 95% 범위)
                let targetPos = 50 + (cents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // [핵심] 초고속 추격: 현재 위치에서 목표 위치로 아주 빠르게 속도를 보정
                velocity = (targetPos - currentPos) * followSpeed;
                
                // 정튜닝 판단 (±3센트)
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    playBeep(); 
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // [소리가 감지되지 않는 경우: 중력 효과]
                // 왼쪽 끝(5%)으로 가려는 힘 발생
                velocity += (5 - currentPos) * 0.05; 
                velocity -= gravity * 0.15; // 중력 가속도 추가
                
                noteEl.classList.remove('tuned');
                needleEl.classList.remove('tuned');
            }

            // 2. 물리 연산 적용
            velocity *= friction; // 마찰력으로 속도 감쇄
            currentPos += velocity;

            // 경계값 처리 (유리관 벽 뚫기 방지)
            if (currentPos <= 5) { currentPos = 5; velocity = 0; }
            if (currentPos >= 95) { currentPos = 95; velocity = 0; }

            // 3. 바늘 위치 업데이트 (CSS transform보다 left가 직관적이라 유지)
            needleEl.style.left = currentPos + "%";

            // 브라우저의 다음 프레임에 맞춰 다시 실행 (약 60~120fps)
            animationId = requestAnimationFrame(updateLoop);
        }

        /* 뚜뚜 효과음 (정튜닝 시) */
        function playBeep() {
            const now = Date.now();
            if (now - lastBeepTime < 700) return; // 0.7초 간격 제한
            lastBeepTime = now;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioContext.currentTime);
            gain.gain.setValueAtTime(0.04, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.1);
        }

        /* 고민감도 주파수 검출 알고리즘 */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            // RMS 문턱값을 낮추어 아주 미세한 기타 잔향도 잡아냄
            if (Math.sqrt(rms / size) < 0.003) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
