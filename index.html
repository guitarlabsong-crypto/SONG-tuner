<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v10 - High-Freq Optimized</title>
    <style>
        /* [1] 기본 레이아웃 */
        body { 
            background: #cbd3da; color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh; margin: 0; padding: 20px 0; 
            font-family: 'Segoe UI', sans-serif; box-sizing: border-box; 
            user-select: none; overflow: hidden;
        }

        /* [2] 상단 디스플레이 */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7.5rem; font-weight: 900; color: #7f8c8d; line-height: 1;
        }
        .note-alpha.tuned {
            color: #fff; text-shadow: 0 0 20px #2ecc71, 0 0 50px #2ecc71;
        }
        .freq-display { 
            font-size: 1.8rem; color: #636e72; font-family: monospace; 
            margin-top: 5px; font-weight: bold;
        }

        /* [3] 중앙 유리관 */
        .glass-rect-container {
            position: relative; width: 92%; max-width: 550px; height: 170px;
            background: rgba(255, 255, 255, 0.3); border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 10px 25px rgba(255, 255, 255, 0.5), 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; overflow: hidden;
        }

        /* [4] 커스텀 바늘 (검정 중심 + 주황 테두리) */
        .needle {
            position: absolute; width: 8px; height: 100%; background: #000; 
            border-left: 2px solid #ff9f43; border-right: 2px solid #ff9f43; 
            left: 5%; transform: translateX(-50%); z-index: 10;
            box-shadow: 0 0 10px rgba(255, 159, 67, 0.5); box-sizing: border-box;
        }
        .needle.tuned { 
            border-left-color: #2ecc71; border-right-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc71; 
        }

        /* 눈금 레이아웃 */
        .ticks-container {
            position: absolute; width: 90%; left: 5%; height: 100%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1; opacity: 0.3;
        }
        .tick { width: 1px; height: 12px; background: #000; position: relative; }
        .tick.major { height: 40px; width: 2px; }
        .tick-label {
            position: absolute; bottom: -28px; left: 50%;
            transform: translateX(-50%); font-size: 0.85rem; font-weight: bold;
        }
        .center-guide {
            position: absolute; width: 2px; height: 100%;
            background: rgba(46, 204, 113, 0.4); left: 50%;
            transform: translateX(-50%); z-index: 2;
        }

        /* [5] 하단 영역 */
        .bottom-area {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .tuner-btn {
            padding: 22px 85px; font-size: 1.5rem; font-weight: bold;
            background: #34495e; border: none; color: white; border-radius: 50px; cursor: pointer;
        }
        .tuner-btn.running { background: #c0392b; }
        .lab-watermark {
            color: #7f8c8d; font-weight: bold; letter-spacing: 1.5px; font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        let audioContext, analyser, animationId;
        let isRunning = false;
        let lastBeepTime = 0;

        /**
         * 물리 엔진 설정 - 200Hz 이상에서 더 묵직하게 변하도록 로직 추가
         */
        let currentPos = 5;      
        let velocity = 0;        
        let smoothedCents = 0;   // 고음역대 떨림 방지용 필터링 변수
        const gravity = 0.8;      

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function initTicks() {
            for (let i = -50; i <= 50; i += 5) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) {
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        startBtn.addEventListener('click', async () => {
            if (isRunning) { stopTuner(); return; }
            startTuner();
        });

        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop();
            } catch (err) { alert("마이크 권한이 필요합니다."); }
        }

        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--";
            freqEl.innerText = "0 Hz";
            noteEl.classList.remove('tuned');
            needleEl.classList.remove('tuned');
        }

        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                const intPitch = Math.round(pitch); // 주파수 정수화
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const rawCents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                // [핵심] 200Hz 이상 고음역대 대응 로직
                let followSpeed, frictionValue;

                if (pitch >= 200) {
                    // 고음역대: 바늘이 매우 묵직하고 천천히 움직이게 설정 (안정성 극대화)
                    followSpeed = 0.05; 
                    frictionValue = 0.7;
                    // 저역 통과 필터(LPF): 새로운 센트값의 10%만 반영하여 떨림 억제
                    smoothedCents = (smoothedCents * 0.9) + (rawCents * 0.1);
                } else {
                    // 저음역대: 반응성을 높여 시원하게 움직이게 설정
                    followSpeed = 0.15;
                    frictionValue = 0.8;
                    // 빠른 반응을 위해 필터 비중 낮춤
                    smoothedCents = (smoothedCents * 0.5) + (rawCents * 0.5);
                }

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = intPitch + " Hz";

                let targetPos = 50 + (smoothedCents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // 물리 엔진 업데이트
                velocity += (targetPos - currentPos) * followSpeed;
                velocity *= frictionValue; 

                if (Math.abs(rawCents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    playNoteBeep(standardFreq); 
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // 무음 시 복귀 로직
                velocity += (5 - currentPos) * 0.02; 
                velocity -= gravity * 0.1;
                velocity *= 0.8;
                noteEl.classList.remove('tuned');
                needleEl.classList.remove('tuned');
            }

            currentPos += velocity;
            if (currentPos <= 5) { currentPos = 5; velocity = 0; }
            if (currentPos >= 95) { currentPos = 95; velocity = 0; }

            needleEl.style.left = currentPos + "%";
            animationId = requestAnimationFrame(updateLoop);
        }

        /**
         * 정튜닝 시 해당 음명 소리 재생
         */
        function playNoteBeep(freq) {
            const now = Date.now();
            if (now - lastBeepTime < 900) return;
            lastBeepTime = now;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioContext.currentTime);
            gain.gain.setValueAtTime(0.05, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.2);
        }

        /**
         * 주파수 추출 알고리즘 (고음역 최적화)
         */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            // 고음역 노이즈 무시를 위해 임계값 살짝 상향 (0.009)
            if (Math.sqrt(rms / size) < 0.009) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
