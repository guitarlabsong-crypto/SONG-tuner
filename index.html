<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v9 - Smooth Physics</title>
    <style>
        /* [1] 기본 레이아웃 설정 */
        body { 
            background: #cbd3da; /* 배경색: 차분한 회색 */
            color: #333; /* 기본 글자색: 진한 회색 */
            display: flex; /* 유연한 레이아웃 사용 */
            flex-direction: column; /* 세로 방향으로 요소 배치 */
            align-items: center; /* 가로 중앙 정렬 */
            justify-content: space-between; /* 요소들 사이에 균등한 간격 배치 */
            height: 100vh; /* 화면 높이 전체 사용 */
            margin: 0; /* 기본 여백 제거 */
            padding: 20px 0; /* 상하 여백 20px */
            font-family: 'Segoe UI', sans-serif; /* 폰트 설정 */
            box-sizing: border-box; /* 패딩을 높이에 포함 */
            user-select: none; /* 텍스트 선택 방지 */
            overflow: hidden; /* 스크롤 방지 */
        }

        /* [2] 상단 음명 및 주파수 표시부 */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7.5rem; /* 음명 크기: 매우 크게 */
            font-weight: 900; /* 글자 두께: 아주 두껍게 */
            color: #7f8c8d; /* 평상시 음명 색상 */
            line-height: 1; /* 행간 조절 */
        }
        /* 정튜닝 시(tuned 클래스 추가 시) 효과 */
        .note-alpha.tuned {
            color: #fff; /* 글자색 흰색으로 변경 */
            text-shadow: 0 0 20px #2ecc71, 0 0 50px #2ecc71; /* 녹색 네온 효과 */
        }
        .freq-display { 
            font-size: 1.8rem; 
            color: #636e72; 
            font-family: monospace; /* 등폭 폰트 사용 */
            margin-top: 5px; 
            font-weight: bold;
        }

        /* [3] 중앙 튜닝 눈금 유리관 공간 */
        .glass-rect-container {
            position: relative; /* 자식 요소(바늘, 눈금) 배치의 기준점 */
            width: 92%;
            max-width: 550px;
            height: 170px;
            background: rgba(255, 255, 255, 0.3); /* 반투명 흰색 배경 */
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            /* 입체감을 위한 내부 및 외부 그림자 효과 */
            box-shadow: inset 0 10px 25px rgba(255, 255, 255, 0.5), 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            overflow: hidden; /* 유리관을 벗어나는 요소 숨김 */
        }

        /* [4] 튜닝 바늘 디자인 (검정 중심 + 주황 테두리) */
        .needle {
            position: absolute;
            width: 8px; /* 바늘 폭 */
            height: 100%;
            background: #000; /* 바늘 중심색: 검정 */
            border-left: 1px solid #ff9f43; /* 왼쪽 테두리: 주황 */
            border-right: 1px solid #ff9f43; /* 오른쪽 테두리: 주황 */
            left: 5%; /* 초기 위치 */
            transform: translateX(-50%); /* 중심점 맞춤 */
            z-index: 10; /* 눈금보다 위로 오도록 */
            box-shadow: 0 0 10px rgba(255, 159, 67, 0.5); /* 주황색 은은한 빛 */
            box-sizing: border-box;
        }
        /* 정튜닝 시 바늘 색상 변경 */
        .needle.tuned { 
            border-left-color: #2ecc71; /* 테두리 녹색으로 */
            border-right-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc71; /* 녹색 네온 빛 */
        }

        /* 눈금(Tick)들이 담기는 컨테이너 */
        .ticks-container {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 100%;
            display: flex;
            justify-content: space-between; /* 눈금을 양옆으로 균등 배분 */
            align-items: center;
            z-index: 1;
            opacity: 0.3; /* 눈금을 은은하게 표시 */
        }
        /* 개별 눈금 스타일 */
        .tick { width: 1px; height: 12px; background: #000; position: relative; }
        /* 큰 눈금(10단위) 스타일 */
        .tick.major { height: 40px; width: 2px; }
        /* 눈금 아래 숫자 라벨 */
        .tick-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: bold;
        }
        /* 중앙 0점 가이드 라인 */
        .center-guide {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(46, 204, 113, 0.4); /* 연한 녹색 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* [5] 하단 조작 영역 */
        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        /* 시작/중지 버튼 스타일 */
        .tuner-btn {
            padding: 22px 85px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #34495e;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
        }
        /* 튜너 실행 중 버튼 색상 */
        .tuner-btn.running { background: #c0392b; }

        /* 워터마크 텍스트 */
        .lab-watermark {
            color: #7f8c8d; /* 회색 */
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        // 전역 변수 설정
        let audioContext, analyser, animationId;
        let isRunning = false; // 실행 상태 체크
        let lastBeepTime = 0; // 효과음 중복 발생 방지 타이머

        /**
         * 부드러운 움직임을 위한 물리 엔진 설정값
         */
        let currentPos = 5;      // 바늘의 현재 위치 (%)
        let velocity = 0;        // 바늘의 이동 속도
        const friction = 0.75;    // 마찰력: 바늘이 멈출 때 묵직함을 줌
        const followSpeed = 0.12; // 반응성: 주파수를 따라가는 속도 (필터 역할)
        const gravity = 0.8;      // 소리가 없을 때 바늘을 왼쪽으로 당기는 힘

        // HTML 요소 선택
        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        // 음표 이름 배열 (도, 도#, 레...)
        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        /**
         * 눈금을 동적으로 생성하는 함수 (-50부터 +50까지)
         */
        function initTicks() {
            for (let i = -50; i <= 50; i += 5) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) { // 10단위마다 큰 눈금과 숫자 표시
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks(); // 눈금 초기화 실행

        // 버튼 클릭 이벤트 리스너
        startBtn.addEventListener('click', async () => {
            if (isRunning) { stopTuner(); return; } // 실행 중이면 중지
            startTuner(); // 중지 상태면 시작
        });

        /**
         * 마이크 연결 및 오디오 분석기 초기화
         */
        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx(); // 오디오 객체 생성
            analyser = audioContext.createAnalyser(); // 분석기 생성
            analyser.fftSize = 2048; // 데이터 정밀도 설정

            try {
                // 사용자 마이크 스트림 획득
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                // 마이크 소리를 분석기에 연결
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop(); // 실시간 분석 루프 시작
            } catch (err) { alert("마이크 권한이 필요합니다."); }
        }

        /**
         * 튜너 중지 및 초기화
         */
        function stopTuner() {
            cancelAnimationFrame(animationId); // 반복 루프 정지
            if (audioContext) audioContext.close(); // 오디오 연결 종료
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--";
            freqEl.innerText = "0 Hz";
        }

        /**
         * 실시간 오디오 분석 및 바늘 업데이트 루프 (매 초당 약 60회 실행)
         */
        function updateLoop() {
            if (!isRunning) return; // 중지되면 실행 안 함

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer); // 소리 파형 데이터 가져오기

            // 주파수(Pitch) 추출 알고리즘 호출
            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                // 1. Hz 정수화 (반올림)
                const intPitch = Math.round(pitch);
                
                // 2. 음명(Note) 및 오차(Cents) 계산
                // MIDI 노트 번호 계산식
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                // 해당 음명의 표준 주파수 계산
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                // 표준 주파수와의 거리 계산 (센트 단위)
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12]; // 음명 텍스트 업데이트
                freqEl.innerText = intPitch + " Hz"; // 주파수 정수 표시

                // 3. 목표 위치 계산 (5% ~ 95% 사이 매핑)
                let targetPos = 50 + (cents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // 4. 물리 엔진: 목표 지점까지 부드럽게 속도 부여 (추격 로직)
                velocity += (targetPos - currentPos) * followSpeed;
                
                // 5. 정튜닝(Perfect Pitch) 여부 확인 (오차 범위 ±3 이내)
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    playNoteBeep(standardFreq); // 정튜닝된 음의 소리 재생
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // 소리가 없을 때 바늘을 왼쪽(5%)으로 복귀시키는 물리 연산
                velocity += (5 - currentPos) * 0.02; 
                velocity -= gravity * 0.1;
                noteEl.classList.remove('tuned');
                needleEl.classList.remove('tuned');
            }

            // 6. 물리값 실제로 적용 (속도 → 위치 반영)
            velocity *= friction; // 마찰력을 곱해 속도 감속
            currentPos += velocity;

            // 유리관 벽에 부딪혔을 때 처리
            if (currentPos <= 5) { currentPos = 5; velocity = 0; }
            if (currentPos >= 95) { currentPos = 95; velocity = 0; }

            needleEl.style.left = currentPos + "%"; // 바늘 위치 CSS 업데이트
            animationId = requestAnimationFrame(updateLoop); // 다음 프레임 예약
        }

        /**
         * 정튜닝 성공 시 해당 음계의 비프음을 재생하는 함수
         * @param {number} freq - 재생할 주파수
         */
        function playNoteBeep(freq) {
            const now = Date.now();
            if (now - lastBeepTime < 900) return; // 0.9초 이내 재발생 방지
            lastBeepTime = now;

            const osc = audioContext.createOscillator(); // 소리 발생기
            const gain = audioContext.createGain(); // 볼륨 조절기
            osc.type = 'sine'; // 부드러운 사인파
            osc.frequency.setValueAtTime(freq, audioContext.currentTime); // 주파수 설정
            gain.gain.setValueAtTime(0.05, audioContext.currentTime); // 볼륨 5%
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); // 점점 사라지게
            osc.connect(gain);
            gain.connect(audioContext.destination); // 스피커 연결
            osc.start();
            osc.stop(audioContext.currentTime + 0.2); // 0.2초 후 중지
        }

        /**
         * 오디오 버퍼에서 주파수를 추출하는 알고리즘 (Autocorrelation)
         */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0; // 소리 크기 체크용
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            // 소리 크기가 너무 작으면 분석 중단 (노이즈 방지용 0.008)
            if (Math.sqrt(rms / size) < 0.008) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            if (maxpos !== -1) return sampleRate / maxpos; // 계산된 주파수 반환
            return -1;
        }
    </script>
</body>
</html>
