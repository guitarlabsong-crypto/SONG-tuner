<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v4</title>
    <style>
        /* [요청 2] 전체 배경 회색 및 중앙 정렬 */
        body { 
            background: #cbd3da; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; /* 상, 중, 하 배치를 위해 변경 */
            height: 100vh; 
            margin: 0; 
            padding: 40px 0; /* 상하 여백 */
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
        }

        /* [요청 3] 음정 및 Hz를 화면 상단으로 배치 */
        .top-display {
            text-align: center;
            flex-shrink: 0;
        }

        .note-alpha {
            font-size: 6rem;
            font-weight: 900;
            color: #7f8c8d;
            line-height: 1;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* 정튜닝 네온 효과 */
        .note-alpha.tuned {
            color: #fff;
            text-shadow: 0 0 10px #2ecc71, 0 0 30px #2ecc71, 0 0 50px #2ecc71;
        }

        .freq-display {
            font-size: 1.4rem;
            color: #636e72;
            margin-top: 10px;
            font-family: monospace;
        }

        /* [요청 1 & 2] 직사각형 유리관 및 세로 폭 확대 */
        .glass-rect-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            height: 160px; /* 세로 폭 확대 */
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px; /* 직사각형 형태 유지 (약간의 곡률만 부여) */
            
            /* 유리 질감: 입체적인 내부 그림자와 광택 */
            box-shadow: 
                inset 0 10px 20px rgba(255, 255, 255, 0.5),
                inset 0 -10px 20px rgba(0, 0, 0, 0.05),
                0 10px 30px rgba(0, 0, 0, 0.1);
            
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 5;
        }

        /* 유리관 반사광 효과 */
        .glass-rect-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        /* [요청 5] 연속 체크 바늘 (예민한 반응형) */
        .needle {
            position: absolute;
            width: 4px;
            height: 100%; /* 위아래 꽉 차는 바늘 */
            background: #e74c3c;
            left: 5%; /* 기본 위치: 왼쪽 끝 */
            transform: translateX(-50%);
            /* 연속 측정을 위해 transition을 제거하거나 매우 짧게 설정 */
            transition: left 0.03s linear, background 0.2s; 
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .needle.tuned {
            background: #2ecc71;
            box-shadow: 0 0 15px #2ecc71;
        }

        /* 중앙 가이드 라인 */
        .center-line {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(46, 204, 113, 0.4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        /* 배경 눈금 */
        .ticks {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.2;
        }
        .tick { width: 1px; height: 20px; background: #000; }
        .tick.main { height: 50px; width: 3px; }

        /* [요청 4] 하단 버튼 */
        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .tuner-btn {
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #2d3436;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .tuner-btn.running { background: #d63031; }

        /* 워터마크 주황색 */
        .lab-watermark {
            color: #ff9f43;
            font-weight: bold;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0.00 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div class="ticks">
            <div class="tick main"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
            <div class="tick main"></div>
            <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick main"></div>
        </div>
        <div class="center-line"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        let audioContext;
        let analyser;
        let isRunning = false;
        let animationId;

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopTuner();
                return;
            }
            startTuner();
        });

        async function startTuner() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096; // 연속적이고 정밀한 체크를 위해 해상도 높임

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false, // 기타 생음을 위해 에코 캔슬링 끔
                        noiseSuppression: false, // 노이즈 억제 끔 (악기음 보존)
                        autoGainControl: false   // 자동 볼륨 조절 끔
                    } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop();
            } catch (err) {
                alert("마이크 접근이 필요합니다.");
            }
        }

        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--";
            noteEl.classList.remove('tuned');
            freqEl.innerText = "0.00 Hz";
            needleEl.style.left = "5%";
            needleEl.classList.remove('tuned');
        }

        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            // [요청 5] 연속 체크 로직
            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 60 && pitch < 1000) { 
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = pitch.toFixed(2) + " Hz";

                // 바늘 위치 계산 (5% ~ 95% 사이)
                const position = 50 + (cents * 0.9);
                const limitedPos = Math.max(5, Math.min(95, position));
                needleEl.style.left = limitedPos + "%";

                // 정튜닝 효과 (±3센트)
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // [요청 3] 입력이 없으면 바늘을 왼쪽 끝(5%)으로
                needleEl.style.left = "5%";
                needleEl.classList.remove('tuned');
                noteEl.classList.remove('tuned');
            }

            animationId = requestAnimationFrame(updateLoop);
        }

        // Pitch Detection (Autocorrelation)
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            if (Math.sqrt(rms / size) < 0.01) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
