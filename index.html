<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v10 - High-Pitch Optimized</title>
    <style>
        /* [1] 기본 레이아웃 및 배경 설정 */
        body { 
            background: #cbd3da; /* 전체 배경: 연회색 */
            color: #333; /* 기본 텍스트: 진회색 */
            display: flex; /* 요소 수직 정렬을 위한 플렉스 박스 */
            flex-direction: column; /* 요소를 위아래로 배치 */
            align-items: center; /* 가로 중앙 정렬 */
            justify-content: space-between; /* 요소 간 간격 자동 조절 */
            height: 100vh; /* 화면 높이 전체 사용 */
            margin: 0; padding: 20px 0; /* 여백 설정 */
            font-family: 'Segoe UI', sans-serif; /* 현대적인 폰트 적용 */
            box-sizing: border-box; /* 패딩 포함 크기 계산 */
            user-select: none; /* 텍스트 선택 방지 */
            overflow: hidden; /* 스크롤바 제거 */
        }

        /* [2] 음명 및 주파수 표시 영역 */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7.5rem; /* 음명 크기 확대 */
            font-weight: 900; /* 아주 두꺼운 글씨 */
            color: #7f8c8d; /* 기본 회색 */
            line-height: 1; /* 줄 간격 최소화 */
        }
        /* 정튜닝 시 녹색 광채 효과 */
        .note-alpha.tuned {
            color: #fff; /* 글자색 흰색 */
            text-shadow: 0 0 20px #2ecc71, 0 0 50px #2ecc71; /* 녹색 네온 효과 */
        }
        .freq-display { 
            font-size: 1.8rem; color: #636e72; 
            font-family: monospace; margin-top: 5px; font-weight: bold;
        }

        /* [3] 중앙 튜닝 유리관 디자인 */
        .glass-rect-container {
            position: relative; /* 자식 요소 배치의 기준 */
            width: 92%; max-width: 550px; height: 170px;
            background: rgba(255, 255, 255, 0.3); /* 반투명 배경 */
            border: 2px solid rgba(0, 0, 0, 0.1); /* 미세한 테두리 */
            border-radius: 12px; /* 둥근 모서리 */
            box-shadow: inset 0 10px 25px rgba(255, 255, 255, 0.5), 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; overflow: hidden;
        }

        /* [4] 커스텀 바늘 (주황 테두리 + 검정 중심) */
        .needle {
            position: absolute; width: 8px; height: 100%;
            background: #000; /* 바늘 몸체: 검정 */
            border-left: 2px solid #ff9f43; /* 왼쪽 테두리: 주황 */
            border-right: 2px solid #ff9f43; /* 오른쪽 테두리: 주황 */
            left: 5%; transform: translateX(-50%); z-index: 10;
            box-shadow: 0 0 10px rgba(255, 159, 67, 0.5); /* 주황색 광택 */
            box-sizing: border-box;
        }
        /* 정튜닝 시 바늘 테두리 녹색 변경 */
        .needle.tuned { 
            border-left-color: #2ecc71; border-right-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc71; 
        }

        /* 눈금 및 가이드 라인 */
        .ticks-container {
            position: absolute; width: 90%; left: 5%; height: 100%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1; opacity: 0.3;
        }
        .tick { width: 1px; height: 12px; background: #000; position: relative; }
        .tick.major { height: 40px; width: 2px; }
        .tick-label {
            position: absolute; bottom: -28px; left: 50%;
            transform: translateX(-50%); font-size: 0.85rem; font-weight: bold;
        }
        .center-guide {
            position: absolute; width: 2px; height: 100%;
            background: rgba(46, 204, 113, 0.4); left: 50%;
            transform: translateX(-50%); z-index: 2;
        }

        /* [5] 하단 조작부 */
        .bottom-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; gap: 20px;
        }
        .tuner-btn {
            padding: 22px 85px; font-size: 1.5rem; font-weight: bold;
            background: #34495e; border: none; color: white;
            border-radius: 50px; cursor: pointer;
        }
        .tuner-btn.running { background: #c0392b; } /* 작동 중일 때 빨간색 */

        .lab-watermark {
            color: #7f8c8d; font-weight: bold; letter-spacing: 1.5px; font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        // 오디오 및 애니메이션 전역 변수
        let audioContext, analyser, animationId;
        let isRunning = false; // 실행 상태 플래그
        let lastBeepTime = 0; // 비프음 간격 제어용

        // 물리 엔진 및 고음역대 대응 변수
        let currentPos = 5; // 바늘 현재 위치 (%)
        let velocity = 0; // 바늘 이동 속도
        let friction = 0.8; // 기본 마찰력
        let baseFollowSpeed = 0.12; // 저음역 기본 추격 속도
        const gravity = 0.8; // 소리 없을 때 왼쪽 복귀 힘

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        /**
         * 눈금 초기 생성 (-50 ~ +50)
         */
        function initTicks() {
            for (let i = -50; i <= 50; i += 5) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) {
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        // 버튼 클릭 제어
        startBtn.addEventListener('click', async () => {
            if (isRunning) { stopTuner(); return; }
            startTuner();
        });

        /**
         * 튜너 실행: 고음역 분석을 위한 오디오 노드 설정
         */
        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048; // 분석 창 크기 (고음역 배음 억제 및 반응성 균형)

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop();
            } catch (err) { alert("마이크 사용을 허용해 주세요."); }
        }

        /**
         * 튜너 중지 및 UI 초기화
         */
        function stopTuner() {
            cancelAnimationFrame(animationId); // 루프 중단
            if (audioContext) audioContext.close(); // 오디오 종료
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--"; freqEl.innerText = "0 Hz";
            noteEl.classList.remove('tuned'); needleEl.classList.remove('tuned');
        }

        /**
         * 고음역대 가변 로직이 적용된 메인 루프
         */
        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer); // 실시간 파형 데이터 수집

            const pitch = getPitch(buffer, audioContext.sampleRate); // 주파수 계산

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                const intPitch = Math.round(pitch); // 정수 Hz 표시
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = intPitch + " Hz";

                // [핵심] 고음역대 동적 필터링 로직
                // 주파수가 높을수록(1, 2번 줄) 바늘 추격 속도를 낮추어 떨림 방지
                // 300Hz 이상부터는 반응 속도를 더 둔감하게 설정하여 안정성 확보
                let dynamicFollow = pitch > 300 ? baseFollowSpeed * 0.6 : baseFollowSpeed;
                let dynamicFriction = pitch > 300 ? 0.7 : 0.8; // 고음일수록 마찰력을 높여 묵직하게

                let targetPos = 50 + (cents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // 가변 속도와 마찰력 적용
                velocity += (targetPos - currentPos) * dynamicFollow;
                velocity *= dynamicFriction; 
                
                // 정튜닝 범위 내 진입 시
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    playNoteBeep(standardFreq); 
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // 무입력 시 복귀 물리 연산
                velocity += (5 - currentPos) * 0.02; 
                velocity -= gravity * 0.1;
                noteEl.classList.remove('tuned');
                needleEl.classList.remove('tuned');
                velocity *= friction;
            }

            currentPos += velocity; // 계산된 속도를 위치에 반영

            // 경계값 제한
            if (currentPos <= 5) { currentPos = 5; velocity = 0; }
            if (currentPos >= 95) { currentPos = 95; velocity = 0; }

            needleEl.style.left = currentPos + "%"; // 화면 업데이트
            animationId = requestAnimationFrame(updateLoop); // 반복 실행
        }

        /**
         * 정튜닝 비프음 재생 (음계 대응)
         */
        function playNoteBeep(freq) {
            const now = Date.now();
            if (now - lastBeepTime < 900) return; // 0.9초 쿨타임
            lastBeepTime = now;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioContext.currentTime);
            gain.gain.setValueAtTime(0.04, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.start(); osc.stop(audioContext.currentTime + 0.2);
        }

        /**
         * 주파수 분석 알고리즘 (Autocorrelation)
         */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            // 고음역대 노이즈를 걸러내기 위해 임계값 미세 조정
            if (Math.sqrt(rms / size) < 0.009) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
