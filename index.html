<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v8 - Integer Precision</title>
    <style>
        /* [1] 기본 레이아웃: 회색 배경 및 중앙 정렬 */
        body { 
            background: #cbd3da; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        /* [2] 상단 디스플레이: 음명(알파벳)과 정수 주파수(Hz) */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7.5rem;
            font-weight: 900;
            color: #7f8c8d;
            line-height: 1;
            transition: all 0.1s;
        }
        /* 정튜닝 시 초록색 네온 효과 */
        .note-alpha.tuned {
            color: #fff;
            text-shadow: 0 0 20px #2ecc71, 0 0 50px #2ecc71;
        }
        .freq-display { 
            font-size: 1.8rem; 
            color: #636e72; 
            font-family: 'Courier New', Courier, monospace; 
            margin-top: 5px; 
            font-weight: bold;
        }

        /* [3] 중앙 직사각형 유리관 디자인 */
        .glass-rect-container {
            position: relative;
            width: 92%;
            max-width: 550px;
            height: 170px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            box-shadow: 
                inset 0 10px 25px rgba(255, 255, 255, 0.5),
                0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* 유리관 광택 효과 */
        .glass-rect-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        /* 눈금 영역 */
        .ticks-container {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            opacity: 0.3;
        }
        .tick { width: 1px; height: 12px; background: #000; position: relative; }
        .tick.major { height: 40px; width: 2px; }
        .tick-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* [4] 물리 엔진 바늘: 소리에 반응하여 좌우로 이동 */
        .needle {
            position: absolute;
            width: 5px;
            height: 100%;
            background: #e74c3c;
            left: 5%; /* 기본 위치 (가장 왼쪽) */
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .needle.tuned { background: #2ecc71; box-shadow: 0 0 20px #2ecc71; }

        .center-guide {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(46, 204, 113, 0.4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* [5] 하단 컨트롤 및 회색 워터마크 */
        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .tuner-btn {
            padding: 22px 85px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #34495e;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .tuner-btn.running { background: #c0392b; }

        /* [요청] 회색 워터마크 */
        .lab-watermark {
            color: #7f8c8d; /* 회색(Grey) */
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.95rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        /**
         * 튜너 전역 변수 설정
         */
        let audioContext, analyser, animationId;
        let isRunning = false;
        let lastBeepTime = 0;

        // 물리 엔진 변수
        let currentPos = 5;      // 바늘의 현재 위치 (%)
        let velocity = 0;        // 바늘의 현재 이동 속도
        const gravity = 0.95;    // 소리 없을 때 왼쪽으로 끌어당기는 힘
        const friction = 0.85;   // 움직임의 떨림을 방지하는 마찰 계수
        const followSpeed = 0.75; // 소리가 들릴 때 주파수 위치를 쫓아가는 반응도

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        // 12음계 배열
        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        /**
         * [초기화] 눈금 생성 (-50 ~ 0 ~ +50)
         */
        function initTicks() {
            for (let i = -50; i <= 50; i += 5) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) {
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        /**
         * [이벤트] 튜너 시작/중지 버튼
         */
        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopTuner();
                return;
            }
            startTuner();
        });

        /**
         * [기능] 오디오 스트림 및 분석기 시작
         */
        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048; // 고속 반응을 위한 적정 사이즈

            try {
                // 마이크 수음 최적화 설정 (에코 제거 등을 꺼서 순수 기타음 확보)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop(); // 실시간 루프 시작
            } catch (err) {
                alert("마이크 권한 허용이 필요합니다.");
            }
        }

        /**
         * [기능] 튜너 완전 중지
         */
        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            resetUI();
        }

        /**
         * [기능] UI 상태 초기화
         */
        function resetUI() {
            noteEl.innerText = "--";
            noteEl.classList.remove('tuned');
            freqEl.innerText = "0 Hz";
            needleEl.classList.remove('tuned');
        }

        /**
         * [핵심 루프] 초고속 수음 및 바늘 물리 연산
         */
        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            // 주파수 검출
            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                // [소리 감지 시]
                // 1. Hz를 정수로 반환하여 시각적 안정화 확보
                const intPitch = Math.round(pitch);
                
                // 2. 음명 계산
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                
                // 3. 오차(cents) 계산
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = intPitch + " Hz";

                // 4. 바늘 목표 위치 설정 (5% ~ 95% 범위)
                let targetPos = 50 + (cents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // 5. 바늘 속도 연산 (추격 로직)
                velocity = (targetPos - currentPos) * followSpeed;
                
                // 6. 정튜닝 판단 (±3센트 이내)
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    // [요청] 해당 음계의 소리로 효과음 재생
                    playNoteBeep(standardFreq); 
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // [소리 미감지 시: 중력 로직]
                velocity += (5 - currentPos) * 0.05; // 왼쪽 끝으로 복귀하려는 힘
                velocity -= gravity * 0.2; // 왼쪽으로 떨어지는 가속도
                resetUI();
            }

            // 물리 엔진 값 적용
            velocity *= friction; // 마찰력 적용
            currentPos += velocity;

            // 경계값 처리
            if (currentPos <= 5) { currentPos = 5; velocity = 0; }
            if (currentPos >= 95) { currentPos = 95; velocity = 0; }

            // 바늘 위치 DOM 반영
            needleEl.style.left = currentPos + "%";

            // 초고속 반복 (약 60fps)
            animationId = requestAnimationFrame(updateLoop);
        }

        /**
         * [효과음] 정튜닝 시 해당 음의 주파수로 소리 발생
         * @param {number} freq - 정튜닝된 음의 표준 주파수
         */
        function playNoteBeep(freq) {
            const now = Date.now();
            if (now - lastBeepTime < 800) return; // 0.8초 간격 제한 (연속 소음 방지)
            lastBeepTime = now;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = 'sine'; // 부드러운 사인파
            osc.frequency.setValueAtTime(freq, audioContext.currentTime); // [요청] 해당 음 주파수 설정
            
            gain.gain.setValueAtTime(0.05, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15); // 자연스러운 소멸
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.15);
        }

        /**
         * 주파수 검출 알고리즘 (Autocorrelation)
         */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            if (Math.sqrt(rms / size) < 0.003) return -1; // 최소 수음 임계값

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
