<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner v6 - Gravity & High Sensitivity</title>
    <style>
        /* 전체 레이아웃 - 회색 배경 */
        body { 
            background: #cbd3da; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
            font-family: sans-serif;
            box-sizing: border-box;
            user-select: none;
        }

        /* [상단] 음명 및 Hz 표시부 */
        .top-display { text-align: center; margin-top: 10px; }
        .note-alpha {
            font-size: 7rem;
            font-weight: 900;
            color: #7f8c8d;
            line-height: 1;
            transition: color 0.1s, text-shadow 0.1s;
        }
        .note-alpha.tuned {
            color: #fff;
            text-shadow: 0 0 20px #2ecc71, 0 0 40px #2ecc71;
        }
        .freq-display { font-size: 1.5rem; color: #636e72; font-family: monospace; margin-top: 10px; }

        /* [중앙] 직사각형 유리관 디자인 */
        .glass-rect-container {
            position: relative;
            width: 92%;
            max-width: 550px;
            height: 180px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            box-shadow: 
                inset 0 15px 30px rgba(255, 255, 255, 0.4),
                inset 0 -10px 20px rgba(0, 0, 0, 0.05),
                0 15px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* 유리관 반사광 */
        .glass-rect-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, transparent 100%);
            pointer-events: none;
        }

        /* 눈금 레이어 */
        .ticks-container {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            opacity: 0.3;
        }
        .tick { width: 1px; height: 15px; background: #000; position: relative; }
        .tick.major { height: 45px; width: 2px; }
        .tick-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* [바늘] 중력 엔진으로 제어될 시침 */
        .needle {
            position: absolute;
            width: 5px;
            height: 100%;
            background: #e74c3c;
            left: 5%; /* 초기 위치 (왼쪽 끝) */
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            /* 물리 엔진을 위해 CSS transition은 가급적 제거하거나 매우 짧게 설정 */
            transition: background 0.2s; 
        }
        .needle.tuned { background: #2ecc71; box-shadow: 0 0 20px #2ecc71; }

        .center-guide {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(46, 204, 113, 0.4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* [하단] 조작 및 워터마크 */
        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .tuner-btn {
            padding: 22px 75px;
            font-size: 1.4rem;
            font-weight: bold;
            background: #2d3436;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .tuner-btn.running { background: #d63031; }

        .lab-watermark {
            color: gray; /* 주황색 워터마크 */
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0.00 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        /* [전역 변수 및 물리 엔진 변수] */
        let audioContext, analyser, animationId;
        let isRunning = false;
        let lastBeepTime = 0;

        // 물리 엔진 관련
        let currentPos = 5;      // 현재 바늘 위치 (%)
        let velocity = 0;        // 바늘 이동 속도
        const gravity = 0.7;     // 왼쪽으로 당기는 중력의 힘 (숫자가 클수록 빨리 떨어짐)
        const friction = 0.6;   // 마찰력 (움직임의 부드러움 조절)

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay');
        const startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        /* [눈금 초기화] */
        function initTicks() {
            for (let i = -50; i <= 50; i += 5) { // 2배 더 많은 눈금
                const tick = document.createElement('div');
                tick.className = 'tick';
                if (i % 10 === 0) {
                    tick.classList.add('major');
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                    tick.appendChild(label);
                }
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        /* [튜너 제어] */
        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopTuner();
                return;
            }
            startTuner();
        });

        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx();
            analyser = audioContext.createAnalyser();
            // fftSize가 크면 정밀하지만 반응이 느려짐. 민감도를 위해 2048 사용
            analyser.fftSize = 2048; 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop();
            } catch (err) {
                alert("마이크를 사용할 수 없습니다.");
            }
        }

        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--";
            noteEl.classList.remove('tuned');
            freqEl.innerText = "0.00 Hz";
        }

        /* [메인 루프] 물리 엔진 + 수음 루프 */
        function updateLoop() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            // 주파수 검출 (초기 버전의 높은 민감도 로직)
            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1 && pitch > 50 && pitch < 1000) {
                // 소리가 감지될 때: 바늘이 주파수 위치로 즉각 반응
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = pitch.toFixed(2) + " Hz";

                // 목표 위치 계산 (-50~50 센트를 5%~95% 범위로 전환)
                let targetPos = 50 + (cents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));

                // 소리가 들릴 때는 중력을 이기고 해당 위치로 바늘을 고정/미세떨림 표현
                velocity = (targetPos - currentPos) * 0.6; // 반응성 0.6 (매우 빠름)
                
                // 정튜닝 효과 및 사운드
                if (Math.abs(cents) <= 3) {
                    noteEl.classList.add('tuned');
                    needleEl.classList.add('tuned');
                    playBeep();
                } else {
                    noteEl.classList.remove('tuned');
                    needleEl.classList.remove('tuned');
                }
            } else {
                // 소리가 감지되지 않을 때: [중력 엔진 작동]
                // 왼쪽(5%) 방향으로 가속도를 붙여 떨어뜨림
                const pullToLeft = 5;
                velocity += (pullToLeft - currentPos) * 0.05; // 왼쪽으로 끌어당기는 힘
                velocity -= gravity * 0.2; // 추가적인 중력 가속도
                
                noteEl.classList.remove('tuned');
                needleEl.classList.remove('tuned');
            }

            // 물리 연산 적용 (위치 = 현재위치 + 속도)
            velocity *= friction; // 마찰력 적용하여 덜덜거림 방지
            currentPos += velocity;

            // 바닥(왼쪽 끝) 튕김 방지 및 고정
            if (currentPos <= 5) {
                currentPos = 5;
                velocity = 0;
            }
            if (currentPos >= 95) {
                currentPos = 95;
                velocity = 0;
            }

            // 실제 DOM에 반영
            needleEl.style.left = currentPos + "%";

            animationId = requestAnimationFrame(updateLoop);
        }

        /* [효과음] 뚜뚜 비프음 */
        function playBeep() {
            const now = Date.now();
            if (now - lastBeepTime < 600) return;
            lastBeepTime = now;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioContext.currentTime);
            gain.gain.setValueAtTime(0.05, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.1);
        }

        /* [알고리즘] 초기 버전 기반의 고민감도 Autocorrelation */
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            // 소리 인식 문턱값(Threshold)을 0.005로 낮춰서 아주 작은 소리도 잡게 함
            if (Math.sqrt(rms / size) < 0.005) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            if (maxpos !== -1) return sampleRate / maxpos;
            return -1;
        }
    </script>
</body>
</html>
