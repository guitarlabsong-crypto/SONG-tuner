<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Tuner (Sensitive Mode)</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }

        /* [디자인] 가로로 긴 유리관 박스 */
        .glass-container {
            position: relative;
            width: 85%;
            max-width: 450px;
            height: 120px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 25px;
        }

        /* 유리 질감 하이라이트 */
        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        /* [바늘] 좌우로 예민하게 움직이는 바늘 */
        .needle {
            position: absolute;
            width: 3px;
            height: 80%;
            background: #ff4757; /* 붉은색 바늘 */
            left: 50%;
            /* transform: translateX(-50%)를 유지하며 좌우로 이동 */
            transform: translateX(-50%);
            /* 예민한 반응을 위해 transition 시간을 매우 짧게 설정 */
            transition: left 0.02s linear; 
            z-index: 10;
            box-shadow: 0 0 8px rgba(255, 71, 87, 0.6);
        }

        /* 중앙 정튜닝 가이드 라인 */
        .center-line {
            position: absolute;
            width: 2px;
            height: 100%;
            background: #2ecc71;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
        }

        /* 눈금 표시 */
        .ticks {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .tick { width: 1px; height: 15px; background: rgba(255,255,255,0.2); }
        .tick.main { height: 30px; background: rgba(255,255,255,0.5); }

        /* 음명 및 정보 표시 */
        .display { text-align: center; margin-bottom: 40px; }
        .note { font-size: 4.5rem; font-weight: 900; color: #2ecc71; line-height: 1; }
        .freq { font-size: 1.1rem; color: #888; margin-top: 10px; }

        /* 버튼 */
        .btn {
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #2ecc71;
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* [요청사항] 워터마크 주황색 */
        .watermark {
            position: fixed;
            bottom: 20px;
            color: #ff9f43; /* 주황색 */
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="ticks">
            <div class="tick main"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
            <div class="tick main"></div>
            <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick main"></div>
        </div>
        <div class="center-line"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="display">
        <div id="note" class="note">--</div>
        <div id="freq" class="freq">0.00 Hz</div>
    </div>

    <button id="startBtn" class="btn">튜너 시작</button>

    <div class="watermark">SONG,YOUNG-MIN Guitar Lab</div>

    <script>
        let audioContext;
        let analyser;
        let isRunning = false;

        const needleEl = document.getElementById('needle');
        const noteEl = document.getElementById('note');
        const freqEl = document.getElementById('freq');
        const startBtn = document.getElementById('startBtn');

        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                location.reload(); // 간단하게 중지 및 초기화
                return;
            }

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext.createMediaStreamSource(stream).connect(analyser);
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.style.background = "#e74c3c";
                update();
            } catch (err) {
                alert("마이크 권한이 거부되었습니다.");
            }
        });

        function update() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            const pitch = getPitch(buffer, audioContext.sampleRate);

            if (pitch !== -1) {
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = Math.floor(1200 * Math.log(pitch / standardFreq) / Math.log(2));

                noteEl.innerText = notes[noteNum % 12];
                freqEl.innerText = pitch.toFixed(2) + " Hz";

                // [움직임 제어] 필터 없이 검출된 센트값을 즉각 반영 (예민한 모드)
                // -50센트일 때 0%, 0센트일 때 50%, +50센트일 때 100% 위치로 이동
                const position = 50 + (cents); // cents 범위가 보통 -50 ~ 50이므로
                const limitedPos = Math.max(5, Math.min(95, position)); // 좌우 벽 뚫기 방지
                
                needleEl.style.left = limitedPos + "%";
            }

            requestAnimationFrame(update);
        }

        // 주파수 검출 알고리즘 (Autocorrelation)
        function getPitch(buf, sampleRate) {
            let size = buf.length;
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            if (Math.sqrt(rms / size) < 0.01) return -1;

            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            return sampleRate / maxpos;
        }
    </script>
</body>
</html>
