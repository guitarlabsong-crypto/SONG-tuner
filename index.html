<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYM Guitar Tuner v17</title>
    <style>
        /* [1] 레이아웃: 여유 있는 상하 간격 유지 */
        body { 
            background: #cbd3da; color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; 
            height: 100dvh; margin: 0; padding: 50px 20px;
            font-family: 'Segoe UI', sans-serif; box-sizing: border-box; 
            user-select: none; overflow: hidden;
        }

        .top-display { text-align: center; }
        .note-alpha {
            font-size: 7.5rem; font-weight: 900; color: #7f8c8d; line-height: 1;
        }
        .note-alpha.tuned {
            color: #fff; text-shadow: 0 0 20px #2ecc71, 0 0 40px #2ecc71;
        }
        .freq-display { 
            font-size: 1.8rem; color: #636e72; font-family: monospace; font-weight: bold; margin-top: 15px;
        }

        /* [2] 유리관 및 바늘 */
        .glass-rect-container {
            position: relative; width: 100%; max-width: 500px; height: 160px;
            background: rgba(255, 255, 255, 0.3); border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            box-shadow: inset 0 5px 20px rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; overflow: hidden;
        }

        .needle {
            position: absolute; width: 8px; height: 100%; 
            background: #000; left: 5%; transform: translateX(-50%); z-index: 10;
            border-left: 2px solid #ff9f43; border-right: 2px solid #ff9f43;
            box-sizing: border-box;
        }

        .ticks-container {
            position: absolute; width: 90%; left: 5%; height: 100%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1; opacity: 0.25;
        }
        .tick.major { height: 35px; width: 2px; position: relative; background: #000; }
        .tick-label {
            position: absolute; bottom: -25px; left: 50%;
            transform: translateX(-50%); font-size: 0.8rem; font-weight: bold;
        }
        .center-guide {
            position: absolute; width: 2px; height: 100%;
            background: rgba(255, 255, 255, 0.7); left: 50%; transform: translateX(-50%); z-index: 2;
        }

        /* [3] 하단 버튼부 */
        .bottom-area {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px;
        }
        .tuner-btn {
            padding: 20px 70px; font-size: 1.4rem; font-weight: bold;
            background: #34495e; border: none; color: white; border-radius: 50px; 
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .tuner-btn.running { background: #c0392b; }
        .lab-watermark {
            color: #7f8c8d; font-weight: bold; font-size: 0.9rem; letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="top-display">
        <div id="noteDisplay" class="note-alpha">--</div>
        <div id="freqDisplay" class="freq-display">0 Hz</div>
    </div>

    <div class="glass-rect-container">
        <div id="ticksContainer" class="ticks-container"></div>
        <div class="center-guide"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div class="bottom-area">
        <button id="startBtn" class="tuner-btn">튜너 시작</button>
        <div class="lab-watermark">SONG,YOUNG-MIN Guitar Lab</div>
    </div>

    <script>
        let audioContext, analyser, animationId;
        let isRunning = false;
        let lastBeepTime = 0;
        let currentPos = 5, velocity = 0, smoothedCents = 0;
        const gravity = 0.5;

        const needleEl = document.getElementById('needle'), noteEl = document.getElementById('noteDisplay');
        const freqEl = document.getElementById('freqDisplay'), startBtn = document.getElementById('startBtn');
        const ticksContainer = document.getElementById('ticksContainer');
        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function initTicks() {
            for (let i = -50; i <= 50; i += 10) {
                const tick = document.createElement('div');
                tick.className = 'tick major';
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.innerText = i === 0 ? "0" : (i > 0 ? "+" + i : i);
                tick.appendChild(label);
                ticksContainer.appendChild(tick);
            }
        }
        initTicks();

        startBtn.addEventListener('click', async () => {
            if (isRunning) { stopTuner(); return; }
            startTuner();
        });

        async function startTuner() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            
            // [iOS 핵심 수정 1] 아이폰 하드웨어 기본 샘플레이트(48k)로 맞춤 (업샘플링 지연 방지)
            audioContext = new AudioCtx({ 
                latencyHint: 'interactive',
                sampleRate: 48000 
            });

            analyser = audioContext.createAnalyser();
            // [iOS 핵심 수정 2] 버퍼 크기를 4096으로 늘려 서스테인(지속음) 분석 데이터량 확보
            analyser.fftSize = 4096; 
            analyser.smoothingTimeConstant = 0.05; // 응답성 최대로

            try {
                // [iOS 핵심 수정 3] 모든 지능형 오디오 처리 강제 비활성화
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: { exact: false },
                        noiseSuppression: { exact: false },
                        autoGainControl: { exact: false }
                    }
                });

                if (audioContext.state === 'suspended') { await audioContext.resume(); }

                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                isRunning = true;
                startBtn.innerText = "튜너 중지";
                startBtn.classList.add('running');
                updateLoop();
            } catch (err) { alert("마이크 접근 권한이 필요합니다."); }
        }

        function stopTuner() {
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            isRunning = false;
            startBtn.innerText = "튜너 시작";
            startBtn.classList.remove('running');
            noteEl.innerText = "--"; freqEl.innerText = "0 Hz";
            noteEl.classList.remove('tuned');
            needleEl.style.borderColor = "#ff9f43";
        }

        function updateNeedleColor(pos, isTuned) {
            if (isTuned) {
                needleEl.style.borderColor = "#2ecc71";
                needleEl.style.boxShadow = "0 0 15px #2ecc71";
                return;
            }
            const offset = pos - 50; 
            let color = offset < 0 
                ? `hsl(30, 100%, ${60 + (Math.abs(offset)/45 * -10)}%)` 
                : `hsl(0, 100%, ${60 - (offset/45 * 20)}%)`;
            needleEl.style.borderColor = color;
            needleEl.style.boxShadow = `0 0 10px ${color}`;
        }

        function updateLoop() {
            if (!isRunning) return;
            // [iOS 핵심 수정 4] 0.01초 단위로 데이터를 강제 갱신하도록 분석 주기 최적화
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            const pitch = getPitch(buffer, audioContext.sampleRate);
            let isTunedThisFrame = false;

            if (pitch !== -1 && pitch > 50 && pitch < 1200) {
                const noteNum = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                const standardFreq = 440 * Math.pow(2, (noteNum - 69) / 12);
                const rawCents = 1200 * Math.log(pitch / standardFreq) / Math.log(2);

                // 고음역대 튜닝 유지 로직 강화
                let followSpeed = pitch >= 200 ? 0.08 : 0.2;
                let frictionValue = pitch >= 200 ? 0.8 : 0.85;
                smoothedCents = (smoothedCents * 0.8) + (rawCents * 0.2);

                noteEl.innerText = noteStrings[noteNum % 12];
                freqEl.innerText = Math.round(pitch) + " Hz";

                let targetPos = 50 + (smoothedCents * 0.9);
                targetPos = Math.max(5, Math.min(95, targetPos));
                velocity += (targetPos - currentPos) * followSpeed;
                velocity *= frictionValue; 

                if (Math.abs(pitch - standardFreq) <= 1.2) {
                    isTunedThisFrame = true;
                    noteEl.classList.add('tuned');
                    playNoteBeep(standardFreq);
                } else { noteEl.classList.remove('tuned'); }
            } else {
                // 소리가 끊겼을 때 바늘이 툭 떨어지는 속도를 늦춰 서스테인 느낌 유지
                velocity += (currentPos > 50 ? 5 - currentPos : 5 - currentPos) * 0.01; 
                velocity *= 0.95;
                noteEl.classList.remove('tuned');
            }

            currentPos += velocity;
            currentPos = Math.max(5, Math.min(95, currentPos));
            updateNeedleColor(currentPos, isTunedThisFrame);
            needleEl.style.left = currentPos + "%";
            animationId = requestAnimationFrame(updateLoop);
        }

        function playNoteBeep(freq) {
            const now = Date.now(); if (now - lastBeepTime < 1000) return;
            lastBeepTime = now;
            const osc = audioContext.createOscillator(), gain = audioContext.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioContext.currentTime);
            gain.gain.setValueAtTime(0.02, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.start(); osc.stop(audioContext.currentTime + 0.1);
        }

        /**
         * 연산 정밀도와 속도를 높인 고주파 추적 알고리즘
         */
        function getPitch(buf, sampleRate) {
            let size = buf.length, rms = 0;
            for (let i = 0; i < size; i++) rms += buf[i] * buf[i];
            
            // [iOS 핵심 수정 5] 서스테인 인식을 위해 감도(RMS) 문턱값을 대폭 낮춤
            if (Math.sqrt(rms / size) < 0.003) return -1;

            let c = new Float32Array(size);
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size - i; j++) {
                    c[i] = c[i] + buf[j] * buf[j + i];
                }
            }
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            return maxpos !== -1 ? sampleRate / maxpos : -1;
        }
    </script>
</body>
</html>
